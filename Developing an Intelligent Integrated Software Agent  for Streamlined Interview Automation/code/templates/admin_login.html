<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-xl shadow p-6">
    <h1 class="text-2xl font-bold mb-4">Admin Login</h1>

    {% if messages %}
      {% for message in messages %}
        <div class="mb-3 rounded border px-3 py-2 text-sm">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'AdminLogin' %}" class="space-y-3">
      {% csrf_token %}
      <input name="username" type="text" placeholder="Username" class="w-full border rounded px-3 py-2" required />
      <input name="password" type="password" placeholder="Password" class="w-full border rounded px-3 py-2" required />
      <button class="w-full bg-slate-800 text-white rounded py-2">Login</button>
    </form>

    <p class="mt-4 text-sm text-slate-600">Default demo credentials: <code>admin / admin</code></p>
    <p class="mt-4 text-sm text-slate-600">Authorized administrators only</p>

  </div>
</body>
</html>
